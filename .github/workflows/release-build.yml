name: Build Cadmium Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - name: windows-x64
            os: windows-2025
            ffmpeg: windows_64
            sep: ";"


          # Windows ARM64
          - name: windows-arm64
            os: windows-11-arm
            ffmpeg: windows_arm64
            sep: ";"


          # Linux x64
          - name: linux-x64
            os: ubuntu-24.04
            container: debian:13
            ffmpeg: linux_64
            sep: ":"


          # Linux ARM64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            container: debian:13
            ffmpeg: linux_arm64
            sep: ":"


    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}


    steps:
      # Pull the repository
      - name: Checkout repository
        uses: actions/checkout@v7


      # Install Python
      - name: Setup Python 
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"


      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y binutils patchelf


      # Install Python dependencies
      - name: Install Python dependencies
        shell: bash
        run: |
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              python -m pip install --upgrade pip
              python -m pip install -r src/requirements.txt
            elif [[ "${{ runner.os }}" == "Linux" ]]; then
              python3 -m venv venv
              source venv/bin/activate

              python3 -m pip install --upgrade pip
              python3 -m pip install -r src/requirements.txt
            fi


      # Build 
      - name: Build application
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            source venv/bin/activate
          fi
          
          VERSION="${{ github.event.release.tag_name }}"

          pyinstaller --onedir --clean --noconfirm \
            --name "Cadmium" \
            --add-data "src/core/bin/ffmpeg/${{ matrix.ffmpeg }}${{ matrix.sep }}core/bin/ffmpeg/${{ matrix.ffmpeg }}" \
            src/main.py


      # Initialise files
      - name: Initialise files
        shell: bash
        run: |
          echo "$PWD"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./dist/Cadmium/Cadmium.exe --initialise_only
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            ./dist/Cadmium/Cadmium --initialise_only
          fi


      # Package artifacts
      - name: Package build
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          cd dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../Cadmium-${VERSION}-${{ matrix.name }}.zip" *
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            tar -czf "../Cadmium-${VERSION}-${{ matrix.name }}.tar.gz" *
          fi


      # Upload to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Cadmium-*.zip
            Cadmium-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
