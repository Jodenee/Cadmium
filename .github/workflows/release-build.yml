name: Build Cadmium Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - name: windows-x64
            os: windows-2025
            ffmpeg: windows_64
            sep: ";"

          # Windows ARM64
          - name: windows-arm64
            os: windows-11-arm
            ffmpeg: windows_arm64
            sep: ";"

          # Linux x64
          - name: linux-x64
            os: ubuntu-24.04
            container: debian:13
            ffmpeg: linux_64
            sep: ":"

          # Linux ARM64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            container: debian:13
            ffmpeg: linux_arm64
            sep: ":"

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      # Pull the repository
      - name: Checkout repository
        uses: actions/checkout@v7

      # Install Python (Windows)
      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Install Python (Linux / Debian)
      - name: Install Python (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv

      # Install dependencies (Windows)
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
            python -m pip install --upgrade pip
            python -m pip install -r src/requirements.txt

      # Install dependencies (Linux / Debian)
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
            apt-get update
            apt-get install -y python3 python3-pip python3-venv

            python3 -m venv venv
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r src/requirements.txt

      # Build 
      - name: Build application
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"

          pyinstaller --onedir --clean --noconfirm \
            --name "Cadmium-${VERSION}-${{ matrix.name }}" \
            --add-data "src/core/bin/ffmpeg/${{ matrix.ffmpeg }}${{ matrix.sep }}core/bin/ffmpeg/${{ matrix.ffmpeg }}" \
            src/main.py

      # Package artifacts
      - name: Package build
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          cd dist

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../Cadmium-${VERSION}-${{ matrix.name }}.zip" *
          else
            tar -czf "../Cadmium-${VERSION}-${{ matrix.name }}.tar.gz" *
          fi

      # Upload to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Cadmium-*.zip
            Cadmium-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
